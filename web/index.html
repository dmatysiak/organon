<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrganonSyl — Syllogistic Proof Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: #cccccc;
      }

      .examples {
        display: flex;
        gap: 6px;
      }

      .examples button {
        background: #0e639c;
        color: #ffffff;
        border: none;
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 12px;
        cursor: pointer;
      }

      .examples button:hover {
        background: #1177bb;
      }

      .file-ops {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      .file-ops button {
        background: #3c3c3c;
        color: #cccccc;
        border: 1px solid #555;
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 12px;
        cursor: pointer;
      }

      .file-ops button:hover {
        background: #505050;
      }

      .tabs {
        display: flex;
        gap: 0;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        overflow-x: auto;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        font-size: 12px;
        color: #969696;
        background: #2d2d2d;
        border-right: 1px solid #3c3c3c;
        cursor: pointer;
        white-space: nowrap;
      }

      .tab.active {
        color: #ffffff;
        background: #1e1e1e;
        border-bottom: 1px solid #1e1e1e;
        margin-bottom: -1px;
      }

      .tab .close {
        font-size: 14px;
        line-height: 1;
        opacity: 0.5;
        cursor: pointer;
      }

      .tab .close:hover {
        opacity: 1;
      }

      .tab .modified {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #cccccc;
        display: none;
      }

      .tab.dirty .modified {
        display: inline-block;
      }

      /* -- Main split layout ------------------------------------------ */

      .main-split {
        flex: 1;
        display: flex;
        flex-direction: row;
        overflow: hidden;
      }

      .editor-pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 200px;
      }

      #editor-container {
        flex: 1;
        overflow: hidden;
      }

      .splitter {
        width: 4px;
        background: #3c3c3c;
        cursor: col-resize;
        flex-shrink: 0;
      }

      .splitter:hover,
      .splitter.dragging {
        background: #0e639c;
      }

      /* -- REPL panel -------------------------------------------------- */

      #repl-panel {
        width: 40%;
        min-width: 200px;
        display: flex;
        flex-direction: column;
        background: #1e1e1e;
        border-left: 1px solid #3c3c3c;
      }

      .repl-header {
        display: flex;
        align-items: center;
        padding: 4px 12px;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        font-size: 12px;
        color: #969696;
        gap: 8px;
      }

      .repl-header span {
        font-weight: 600;
        color: #cccccc;
      }

      #repl-output {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo,
          Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
      }

      .repl-line {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .repl-prompt {
        color: #569cd6;
      }

      .repl-info {
        color: #d4d4d4;
      }

      .repl-result {
        color: #4ec9b0;
      }

      .repl-error {
        color: #f44747;
      }

      .repl-input-row {
        display: flex;
        align-items: center;
        padding: 4px 12px 6px;
        gap: 6px;
        border-top: 1px solid #3c3c3c;
        background: #1e1e1e;
      }

      .repl-input-row label {
        font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo,
          Consolas, monospace;
        font-size: 13px;
        color: #569cd6;
        flex-shrink: 0;
      }

      #repl-input {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #d4d4d4;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo,
          Consolas, monospace;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OrganonSyl</h1>
      <div class="examples">
        <button data-example="basics">Basics</button>
        <button data-example="holes">Holes</button>
      </div>
      <div class="file-ops">
        <button id="btn-new">New</button>
        <button id="btn-open">Open</button>
        <button id="btn-save">Save</button>
      </div>
    </header>
    <div class="main-split">
      <div class="editor-pane">
        <div class="tabs" id="tab-bar"></div>
        <div id="editor-container"></div>
      </div>
      <div class="splitter" id="splitter"></div>
      <div id="repl-panel">
        <div class="repl-header">
          <span>REPL</span>
          <span style="color:#969696;font-weight:normal">— type :help for commands</span>
        </div>
        <div id="repl-output"></div>
        <div class="repl-input-row">
          <label for="repl-input">organon-syl&gt;</label>
          <input id="repl-input" type="text" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
