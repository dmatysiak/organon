<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrganonSyl — Syllogistic Proof Assistant</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        color: #cccccc;
      }

      .examples {
        display: flex;
        gap: 6px;
      }

      .examples button {
        background: #0e639c;
        color: #ffffff;
        border: none;
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 12px;
        cursor: pointer;
      }

      .examples button:hover {
        background: #1177bb;
      }

      .file-ops {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      .file-ops button {
        background: #3c3c3c;
        color: #cccccc;
        border: 1px solid #555;
        padding: 4px 10px;
        border-radius: 3px;
        font-size: 12px;
        cursor: pointer;
      }

      .file-ops button:hover {
        background: #505050;
      }

      .tabs {
        display: flex;
        gap: 0;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        overflow-x: auto;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        font-size: 12px;
        color: #969696;
        background: #2d2d2d;
        border-right: 1px solid #3c3c3c;
        cursor: pointer;
        white-space: nowrap;
      }

      .tab.active {
        color: #ffffff;
        background: #1e1e1e;
        border-bottom: 1px solid #1e1e1e;
        margin-bottom: -1px;
      }

      .tab .close {
        font-size: 14px;
        line-height: 1;
        opacity: 0.5;
        cursor: pointer;
      }

      .tab .close:hover {
        opacity: 1;
      }

      .tab .modified {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #cccccc;
        display: none;
      }

      .tab.dirty .modified {
        display: inline-block;
      }

      #editor-container {
        flex: 1;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>OrganonSyl</h1>
      <div class="examples">
        <button data-example="basics">Basics</button>
        <button data-example="holes">Holes</button>
      </div>
      <div class="file-ops">
        <button id="btn-new">New</button>
        <button id="btn-open">Open</button>
        <button id="btn-save">Save</button>
      </div>
    </header>
    <div class="tabs" id="tab-bar"></div>
    <div id="editor-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
